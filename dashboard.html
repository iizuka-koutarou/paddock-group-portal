<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PADDOCK GROUP Portal | Home</title>
  <link rel="stylesheet" href="assets/components/portal-components.css" />
  <link rel="stylesheet" href="assets/css/portal-home-rc.css" />
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>
  <script src="assets/components/portal-components.js" defer></script>
</head>
<body>
  <portal-layout id="portal">
    <portal-sidebar version="Portal v1.0"></portal-sidebar>

    <page-container>
      <portal-header name="飯塚さん" team="Kawasaki Plaza 焼津"></portal-header>

      <section class="dashboard-card-grid" aria-label="業務カード">
        <attendance-card></attendance-card>
        <announcement-card></announcement-card>
        <weather-card></weather-card>
        <academy-card href="paddock-group-academy-main/welcome.html"></academy-card>
      </section>
      <event-card></event-card>
    </page-container>
  </portal-layout>

  <div id="correctionModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="correctionModalTitle">
    <div class="modal-panel">
      <h2 id="correctionModalTitle">訂正申請</h2>
      <p>間違えて打刻した場合は、理由を入力して申請してください。</p>
      <label>訂正内容<input id="correctionValue" placeholder="例：出社 09:12:15 → 08:58:00" /></label>
      <label>理由<textarea id="correctionReason" placeholder="例：押し忘れのため"></textarea></label>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeCorrection()">閉じる</button>
        <button type="button" class="btn-primary" onclick="submitCorrection()">申請する</button>
      </div>
    </div>
  </div>

  <div id="breakModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="breakModalTitle">
    <div class="modal-panel">
      <h2 id="breakModalTitle">外出理由を入力</h2>
      <p>外出前に理由を入力し、「外出する」を押してください。</p>
      <label>外出理由<input id="breakReasonInput" placeholder="例：昼食、銀行、納車、引取り、その他" /></label>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeBreakModal()">キャンセル</button>
        <button type="button" class="btn-primary" onclick="submitBreak()">外出する</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.PortalComponents && typeof window.PortalComponents.refreshIcons === "function") {
        window.PortalComponents.refreshIcons();
      }
    });
  </script>
  <script src="assets/js/portal.js"></script>
</body>
</html>
