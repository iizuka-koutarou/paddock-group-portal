<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PADDOCK GROUP Portal</title>
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="login-page">
  <header class="paddock-header">
  <div class="paddock-inner">
    <div class="paddock-brand">
      <div class="brand">PADDOCK Portal</div>
      <div class="subtitle sr-only">Portal</div>
    </div>
    <div class="paddock-title">
      <div class="page-name">PADDOCK GROUP Portal</div>
    </div>
    <a href="dashboard.html" class="home-btn">🏠 Portal HOME</a>
  </div>
</header><main class="login-shell">
    <section class="login-brand" aria-label="PADDOCK GROUP Portal">
      <p class="brand-kicker">PADDOCK GROUP PORTAL</p>
      <img class="brand-logo-image" src="assets/images/logos/paddock-logo.jpg" alt="PADDOCK" />
      <div class="brand-portal">Portal</div>
      <p class="brand-copy">仕事のはじまりを、ここから。</p>
      <div class="login-feature-pills" aria-label="Portal機能">
        <span>勤怠</span>
        <span>お知らせ</span>
        <span>イベント</span>
        <span>Academy</span>
      </div>
    </section>

    <section class="login-card" aria-label="ログインフォーム">
      <p class="login-label">PADDOCK GROUP PORTAL</p>
      <h1>ログイン</h1>
      <div class="login-line"></div>
      <p class="login-description">出社・退勤、お知らせ確認、Academy学習をここから始めます。</p>

      <form class="login-form" onsubmit="login(event)">
        <label for="userId">ID</label>
        <input type="text" id="userId" value="admin" placeholder="IDを入力" autocomplete="username" required />

        <label for="password">PASSWORD</label>
        <input type="password" id="password" value="password" placeholder="パスワードを入力" autocomplete="current-password" required />

        <button type="submit">Portalへログイン</button>
      </form>

      <p class="login-help">ID・パスワードをお忘れの場合は管理者へ確認してください。</p>
      <p class="login-note">Portal v1.0 / PADDOCK GROUP</p>
    </section>
  </main>

  <script>
    function login(event) {
      event.preventDefault();
      window.location.replace("dashboard.html");
    }
  </script>
</body>
</html>
