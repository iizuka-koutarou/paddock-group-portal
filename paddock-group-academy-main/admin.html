<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PADDOCK Portal | 管理者ページ</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text-main: #1f2937;
      --text-sub: #64748b;
      --line: rgba(148, 163, 184, 0.24);
      --shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
    }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 20px 42px;
      display: grid;
      gap: 18px;
    }

    .topbar {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(24px, 2.2vw, 32px);
      line-height: 1.2;
      color: #0f172a;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      min-height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #eef2ff;
      color: #1e3a8a;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
    }

    .section-title {
      margin: 8px 0 0;
      color: #0f172a;
      font-size: 22px;
      font-weight: 800;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card,
    .panel,
    .store-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .summary-card p {
      margin: 0;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
    }

    .summary-card strong {
      display: block;
      margin-top: 8px;
      font-size: 34px;
      line-height: 1;
      color: #0f172a;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: minmax(340px, 0.95fr) minmax(0, 1.45fr);
      gap: 14px;
    }

    .panel h2 {
      margin: 0;
      color: #0f172a;
      font-size: 20px;
    }

    .panel .sub {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 13px;
      line-height: 1.7;
    }

    .daily-editor {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .daily-editor textarea {
      width: 100%;
      min-height: 140px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.34);
      background: #f8fafc;
      color: #1f2937;
      padding: 12px;
      line-height: 1.8;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
    }

    .editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 800;
      padding: 0 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: #1e3a8a;
      color: #fff;
    }

    .btn-soft {
      border: 1px solid rgba(30, 58, 138, 0.32);
      background: #eef2ff;
      color: #1e3a8a;
    }

    .current-message-box {
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #f8fafc;
      padding: 12px;
      margin-top: 8px;
    }

    .current-message-box p {
      margin: 0;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
    }

    .current-message-text {
      margin: 6px 0 0;
      color: #1f2937;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .status-text {
      min-height: 20px;
      margin: 2px 0 0;
      font-size: 12px;
      font-weight: 800;
      color: #166534;
    }

    .table-wrap {
      margin-top: 12px;
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 940px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      min-height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 800;
    }

    .badge-working { background: #dcfce7; color: #166534; }
    .badge-out { background: #fff3e0; color: #b45309; }
    .badge-break { background: #e8f0ff; color: #1e4db7; }
    .badge-done { background: #e5e7eb; color: #374151; }
    .badge-none { background: #f1f5f9; color: #475569; }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .store-card h3 {
      margin: 0;
      color: #0f172a;
      font-size: 18px;
    }

    .store-counts {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .store-counts div {
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: #f8fafc;
      padding: 8px 10px;
      display: grid;
      gap: 3px;
    }

    .store-counts span {
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }

    .store-counts strong {
      color: #0f172a;
      font-size: 16px;
      line-height: 1;
    }

    @media (max-width: 1180px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel-grid {
        grid-template-columns: 1fr;
      }

      .store-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>管理者ページ</h1>
        <p>管理者向けに、勤務状況とPortal設定を一括で確認できます。</p>
      </div>
      <div class="top-actions">
        <a class="nav-btn" href="portal-settings.html">Portal設定</a>
        <a class="nav-btn" href="../dashboard.html">Portal HOME</a>
      </div>
    </header>

    <h2 class="section-title">本日の勤務状況</h2>
    <section class="summary-grid" aria-label="本日の勤務状況サマリー">
      <article class="summary-card">
        <p>勤務中人数</p>
        <strong id="countWorking">0</strong>
      </article>
      <article class="summary-card">
        <p>外出中人数</p>
        <strong id="countOut">0</strong>
      </article>
      <article class="summary-card">
        <p>休憩中人数</p>
        <strong id="countBreak">0</strong>
      </article>
      <article class="summary-card">
        <p>退勤済人数</p>
        <strong id="countDone">0</strong>
      </article>
    </section>

    <section class="panel-grid" aria-label="管理機能">
      <article class="panel">
        <h2>今日のひとこと</h2>
        <p class="sub">管理者が入力・保存した内容はPortal HOMEへ反映されます。</p>
        <div class="daily-editor">
          <textarea id="dailyMessageInput" placeholder="例：春の風のように、やわらかな笑顔でお客様をお迎えしましょう。"></textarea>
          <div class="current-message-box">
            <p>現在表示中のメッセージ</p>
            <div id="currentMessageText" class="current-message-text"></div>
          </div>
          <div class="editor-actions">
            <button class="btn btn-primary" id="saveMessageBtn" type="button">保存</button>
            <button class="btn btn-soft" id="resetMessageBtn" type="button">初期メッセージへ戻す</button>
            <a class="nav-btn" href="portal-settings.html">詳細設定へ</a>
          </div>
          <p id="saveStatus" class="status-text" aria-live="polite"></p>
        </div>
      </article>

      <article class="panel">
        <h2>スタッフ一覧</h2>
        <p class="sub">氏名・所属店舗・勤務状態・各時刻を確認できます。</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>氏名</th>
                <th>所属店舗</th>
                <th>勤務状態</th>
                <th>出勤時刻</th>
                <th>外出時刻</th>
                <th>戻り時刻</th>
                <th>退勤時刻</th>
                <th>勤務時間</th>
              </tr>
            </thead>
            <tbody id="staffTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>

    <h2 class="section-title">店舗別勤務状況</h2>
    <section class="store-grid" id="storeGrid" aria-label="店舗別勤務状況"></section>
  </main>

  <script>
    const DAILY_MESSAGE_KEY = "paddock_portal_daily_message";
    const STAFF = [
      { id: "iizuka_k", name: "飯塚康太郎", store: "焼津店" },
      { id: "iizuka_s", name: "飯塚宗一郎", store: "焼津店" },
      { id: "aoshima", name: "青島昇平", store: "静岡店" },
    ];

    const DEFAULT_DAILY_QUOTES = {
      spring: [
        "春の風のように、やわらかな笑顔でお客様をお迎えしましょう。",
        "新しい季節の始まりに、丁寧なひと声で安心を届けましょう。",
      ],
      summer: [
        "暑い日こそ、最初のひと言に涼しさと思いやりを添えましょう。",
        "ご来店の瞬間に、爽やかな挨拶で心地よさをつくりましょう。",
      ],
      autumn: [
        "雨の日のご来店には、いつも以上の感謝を言葉にしましょう。",
        "実りの季節こそ、落ち着いた応対で信頼を積み重ねましょう。",
      ],
      winter: [
        "寒い季節ほど、あたたかい声掛けがお客様の心に残ります。",
        "冷える朝こそ、先回りした気配りで安心感を届けましょう。",
      ],
      all: [
        "小さな気配りが、次のご来店につながる一番のサービスです。",
        "整った身だしなみと明るい挨拶が、信頼の第一歩です。",
        "お客様の一日が少し良くなる接客を心がけましょう。",
      ],
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function getSeason(date = new Date()) {
      const month = date.getMonth() + 1;
      if ([3, 4, 5].includes(month)) return "spring";
      if ([6, 7, 8].includes(month)) return "summer";
      if ([9, 10, 11].includes(month)) return "autumn";
      return "winter";
    }

    function getDefaultDailyMessage(date = new Date()) {
      const season = getSeason(date);
      const pool = (DEFAULT_DAILY_QUOTES[season] || []).concat(DEFAULT_DAILY_QUOTES.all);
      return pool[date.getDate() % pool.length];
    }

    function getDailyMessage() {
      const saved = localStorage.getItem(DAILY_MESSAGE_KEY);
      if (saved && saved.trim()) return saved.trim();
      return getDefaultDailyMessage();
    }

    function parseDateTime(value) {
      if (!value) return null;
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatStoredTime(value) {
      const d = parseDateTime(value);
      if (!d) return "--:--:--";
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatDuration(startValue, endValue) {
      const start = parseDateTime(startValue);
      if (!start) return "--";
      const end = parseDateTime(endValue) || new Date();
      const totalSec = Math.max(0, Math.floor((end - start) / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function readStaffState(staffId) {
      const currentUser = localStorage.getItem("currentUser");
      const isCurrentUser = currentUser === staffId;
      const read = (key, fallbackKey) => {
        const scoped = localStorage.getItem(`paddock_${staffId}_${key}`) || localStorage.getItem(`${staffId}_${key}`);
        if (scoped) return scoped;
        return isCurrentUser ? localStorage.getItem(fallbackKey) || "" : "";
      };

      const clockIn = read("clock_in", "paddock_clock_in");
      const clockOut = read("clock_out", "paddock_clock_out");
      const breakStatus = read("break_status", "paddock_break_status");
      const breakOutTime = read("break_out_time", "paddock_break_out_time");
      const breakReturnTime = read("break_return_time", "paddock_break_return_time");

      return { clockIn, clockOut, breakStatus, breakOutTime, breakReturnTime };
    }

    function resolveStatus(state) {
      if (state.clockOut) return { key: "done", label: "退勤", className: "badge-done" };
      if (state.breakStatus === "out") return { key: "out", label: "外出", className: "badge-out" };
      if (state.breakStatus === "break") return { key: "break", label: "休憩", className: "badge-break" };
      if (state.clockIn) return { key: "working", label: "勤務中", className: "badge-working" };
      return { key: "none", label: "未出勤", className: "badge-none" };
    }

    function buildRows() {
      return STAFF.map((staff) => {
        const state = readStaffState(staff.id);
        const status = resolveStatus(state);
        return {
          ...staff,
          ...state,
          status,
          workDuration: formatDuration(state.clockIn, state.clockOut),
        };
      });
    }

    function renderSummary(rows) {
      const counts = { working: 0, out: 0, break: 0, done: 0 };
      rows.forEach((row) => {
        if (counts[row.status.key] !== undefined) counts[row.status.key] += 1;
      });

      document.getElementById("countWorking").textContent = String(counts.working);
      document.getElementById("countOut").textContent = String(counts.out);
      document.getElementById("countBreak").textContent = String(counts.break);
      document.getElementById("countDone").textContent = String(counts.done);
    }

    function renderStaffTable(rows) {
      const body = document.getElementById("staffTableBody");
      body.innerHTML = rows.map((row) => {
        return `
          <tr>
            <td>${row.name}</td>
            <td>${row.store}</td>
            <td><span class="badge ${row.status.className}">${row.status.label}</span></td>
            <td>${formatStoredTime(row.clockIn)}</td>
            <td>${formatStoredTime(row.breakOutTime)}</td>
            <td>${formatStoredTime(row.breakReturnTime)}</td>
            <td>${formatStoredTime(row.clockOut)}</td>
            <td>${row.workDuration}</td>
          </tr>
        `;
      }).join("");
    }

    function renderStoreCards(rows) {
      const grid = document.getElementById("storeGrid");
      const stores = rows.reduce((acc, row) => {
        if (!acc[row.store]) {
          acc[row.store] = { working: 0, out: 0, break: 0, done: 0 };
        }
        if (acc[row.store][row.status.key] !== undefined) {
          acc[row.store][row.status.key] += 1;
        }
        return acc;
      }, {});

      grid.innerHTML = Object.keys(stores).map((storeName) => {
        const count = stores[storeName];
        return `
          <article class="store-card">
            <h3>${storeName}</h3>
            <div class="store-counts">
              <div><span>勤務中</span><strong>${count.working}</strong></div>
              <div><span>外出中</span><strong>${count.out}</strong></div>
              <div><span>休憩中</span><strong>${count.break}</strong></div>
              <div><span>退勤済</span><strong>${count.done}</strong></div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderDailyMessageEditor() {
      const input = document.getElementById("dailyMessageInput");
      const preview = document.getElementById("currentMessageText");
      const status = document.getElementById("saveStatus");

      input.value = localStorage.getItem(DAILY_MESSAGE_KEY) || "";
      preview.textContent = getDailyMessage();

      document.getElementById("saveMessageBtn").addEventListener("click", () => {
        const value = input.value.trim();
        if (!value) {
          localStorage.removeItem(DAILY_MESSAGE_KEY);
          status.textContent = "空欄のため初期メッセージ表示へ切り替えました。";
        } else {
          localStorage.setItem(DAILY_MESSAGE_KEY, value);
          status.textContent = "保存しました。Portal HOMEへ反映されます。";
        }
        preview.textContent = getDailyMessage();
      });

      document.getElementById("resetMessageBtn").addEventListener("click", () => {
        localStorage.removeItem(DAILY_MESSAGE_KEY);
        input.value = "";
        preview.textContent = getDailyMessage();
        status.textContent = "初期メッセージに戻しました。";
      });
    }

    function guardAdminPage() {
      const currentUser = localStorage.getItem("currentUser");
      const role = localStorage.getItem("role") || localStorage.getItem("currentUserRole") || "";
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      if (role !== "admin") {
        alert("権限がありません。Portal HOMEへ戻ります。");
        window.location.href = "../dashboard.html";
      }
    }

    function renderAll() {
      const rows = buildRows();
      renderSummary(rows);
      renderStaffTable(rows);
      renderStoreCards(rows);
    }

    guardAdminPage();
    renderDailyMessageEditor();
    renderAll();
    setInterval(renderAll, 1000);
  </script>
</body>
</html>
