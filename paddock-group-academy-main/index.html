<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PADDOCK Portal | ログイン</title>
  <script src="users.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text-main: #1f2937;
      --text-sub: #64748b;
      --line: rgba(148, 163, 184, 0.24);
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.12), transparent 40%), var(--bg);
      color: var(--text-main);
      font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
      padding: 20px;
    }

    .login-card {
      width: min(460px, 100%);
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 26px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 30px;
      line-height: 1.2;
      text-align: center;
    }

    .sub {
      margin: 0;
      color: var(--text-sub);
      font-size: 13px;
      line-height: 1.8;
      text-align: center;
    }

    .demo {
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      line-height: 1.7;
      padding: 10px 12px;
      margin: 0;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #334155;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #ffffff;
      color: var(--text-main);
      padding: 0 12px;
      font-size: 14px;
    }

    button {
      min-height: 44px;
      border: none;
      border-radius: 999px;
      background: #1e3a8a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    #error {
      min-height: 18px;
      color: #b91c1c;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      margin: 0;
    }

    .home-link {
      color: #1d4ed8;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      display: block;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>PADDOCK Portal</h1>
    <p class="sub">管理者・一般ユーザー共通ログイン</p>
    <p class="demo">管理者ID: admin / 一般ID: ittyan007@gmail.com / パスワード: users.js の設定値</p>

    <label for="id">ID
      <input id="id" type="text" autocomplete="username" placeholder="IDを入力" />
    </label>
    <label for="pass">Password
      <input id="pass" type="password" autocomplete="current-password" placeholder="パスワードを入力" />
    </label>

    <button type="button" onclick="login()">ログイン</button>
    <p id="error" aria-live="polite"></p>
    <a class="home-link" href="../dashboard.html">Portal HOMEへ戻る</a>
  </main>

  <script>
    function login() {
      const id = document.getElementById("id").value.trim();
      const pass = document.getElementById("pass").value;
      const user = users[id];
      const error = document.getElementById("error");

      if (!user || user.password !== pass) {
        error.textContent = "IDまたはパスワードが違います。";
        return;
      }

      localStorage.setItem("currentUser", id);
      localStorage.setItem("currentUserName", user.name);
      localStorage.setItem("currentUserRole", user.role);
      localStorage.setItem("name", user.name);
      localStorage.setItem("role", user.role);
      localStorage.setItem(id + "_lastlogin", new Date().toLocaleString());

      if (user.role === "admin") {
        location.href = "admin.html";
      } else {
        location.href = "welcome.html";
      }
    }
  </script>
</body>
</html>
