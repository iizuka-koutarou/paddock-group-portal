<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal設定 | 今日のひとこと</title>
  <link rel="stylesheet" href="../assets/css/academy-common.css" />
  <style>
    body {
      margin: 0;
      background: #f6f7f9;
      color: #1f2937;
      font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 48px;
      display: grid;
      gap: 18px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
    }

    .breadcrumb a {
      color: #1d4ed8;
      text-decoration: none;
    }

    .panel {
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      background: #ffffff;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      color: #0f172a;
    }

    .desc {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.8;
    }

    label {
      display: grid;
      gap: 8px;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: #f8fafc;
      color: #1f2937;
      padding: 14px;
      font-size: 15px;
      line-height: 1.8;
      resize: vertical;
      font-family: inherit;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    .save-btn {
      min-height: 42px;
      border: none;
      border-radius: 999px;
      background: #1e3a8a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      padding: 0 18px;
      cursor: pointer;
    }

    .status {
      min-height: 20px;
      color: #166534;
      font-size: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="admin.html">管理画面</a>
      <span>›</span>
      <span>Portal設定</span>
      <span>›</span>
      <span>今日のひとこと</span>
    </nav>

    <section class="panel">
      <h1>Portal設定 / 今日のひとこと</h1>
      <p class="desc">毎朝のメッセージを入力して保存すると、Portal HOMEの「今日のひとこと」とヘッダーに即時反映されます。</p>
      <label for="dailyMessageInput">今日のひとこと（2〜5行推奨）
        <textarea id="dailyMessageInput" placeholder="例：\n今日も笑顔でお客様をお迎えしましょう。\n暑い季節です。冷たいお飲み物のお声掛けを忘れずに。"></textarea>
      </label>
      <div class="actions">
        <p class="hint">入力内容はこの端末のローカルストレージに保存されます。</p>
        <button type="button" class="save-btn" id="saveMessageButton">保存する</button>
      </div>
      <p class="status" id="saveStatus" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const DAILY_MESSAGE_KEY = "paddock_portal_daily_message";
    const input = document.getElementById("dailyMessageInput");
    const status = document.getElementById("saveStatus");
    const saveButton = document.getElementById("saveMessageButton");

    function loadSavedMessage() {
      const saved = localStorage.getItem(DAILY_MESSAGE_KEY) || "";
      input.value = saved;
    }

    function saveMessage() {
      const value = input.value.trim();
      if (!value) {
        status.textContent = "メッセージを入力してください。";
        status.style.color = "#b91c1c";
        return;
      }
      localStorage.setItem(DAILY_MESSAGE_KEY, value);
      status.textContent = "保存しました。Portal HOMEに反映されます。";
      status.style.color = "#166534";
    }

    saveButton.addEventListener("click", saveMessage);
    loadSavedMessage();
  </script>
</body>
</html>
